spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver


# fallback pra evitar crash se dialect nao for necessario
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

server.port=${PORT:8080}

spring.mvc.problemdetails.enabled=false


logging.level.org.springframework=INFO


# =========================
# JWT (EVITA CRASH EM DEPLOY)
# =========================
jwt.secret=${JWT_SECRET:dev-secret-change-me}
jwt.expiration=${JWT_EXPIRATION:86400000}


# =========================
# SECURITY DEBUG (so dev)
# =========================
logging.level.org.springframework.security=${SECURITY_LOG_LEVEL:INFO}
