# =========================
# DATABASE (Railway safe)
# =========================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# fallback pra evitar crash se dialect nao for necessario
spring.jpa.hibernate.ddl-auto=update

# opcional (Spring moderno geralmente detecta sozinho)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect


# =========================
# SERVER / ERRORS
# =========================
server.port=${PORT:8080}

# evita crash por erro de bind inesperado
spring.mvc.problemdetails.enabled=false
spring.web.mvc.problemdetails.enabled=false


# =========================
# JWT (EVITA CRASH EM DEPLOY)
# =========================
jwt.secret=${JWT_SECRET:dev-secret-change-me}
jwt.expiration=${JWT_EXPIRATION:86400000}


# =========================
# SECURITY DEBUG (so dev)
# =========================
logging.level.org.springframework.security=${SECURITY_LOG_LEVEL:INFO}